# VIETCLAW RAG Configuration
# Cau hinh he thong Retrieval-Augmented Generation cho Luat phap Viet Nam

# --- Cau hinh Chunking ---
chunking:
  strategy: "hierarchical"  # hierarchical | fixed_size | semantic
  # Chunking theo cau truc phap luat: Phan > Chuong > Muc > Dieu > Khoan > Diem
  hierarchy_levels:
    - phan       # Phan (Part)
    - chuong     # Chuong (Chapter)
    - muc        # Muc (Section)
    - dieu       # Dieu (Article)
    - khoan      # Khoan (Clause)
    - diem       # Diem (Point)
  chunk_size: 1024         # So ky tu toi da moi chunk
  chunk_overlap: 128       # So ky tu overlap giua cac chunks
  min_chunk_size: 100      # Kich thuoc toi thieu cua chunk
  preserve_structure: true # Giu nguyen cau truc phap luat khi chunk
  include_metadata: true   # Dinh kem metadata vao moi chunk
  include_parent_context: true  # Dinh kem context tu cap tren

# --- Cau hinh Embedding ---
embedding:
  model: "text-embedding-3-large"
  dimensions: 3072
  batch_size: 100
  # Model backup/alternative
  fallback_model: "text-embedding-3-small"
  fallback_dimensions: 1536

# --- Cau hinh Vector Store ---
vector_store:
  backend: "chromadb"  # chromadb | pinecone | qdrant | weaviate
  collection_name: "vietclaw_laws"
  distance_metric: "cosine"
  # Cau hinh Chroma
  chroma:
    persist_directory: "./vectordb/chroma"
    anonymized_telemetry: false
  # Cau hinh Qdrant (alternative)
  qdrant:
    host: "localhost"
    port: 6333
    collection_name: "vietclaw_laws"

# --- Cau hinh Retrieval ---
retrieval:
  top_k: 10                    # So ket qua tra ve
  score_threshold: 0.7         # Nguong diem toi thieu
  reranking: true              # Su dung reranking
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-12-v2"
  # Hybrid search: ket hop keyword + semantic
  hybrid_search:
    enabled: true
    keyword_weight: 0.3
    semantic_weight: 0.7
  # Filter theo metadata
  metadata_filters:
    - "loai_van_ban"
    - "linh_vuc"
    - "tinh_trang"
    - "co_quan_ban_hanh"
    - "ngay_ban_hanh"

# --- Cau hinh LLM ---
llm:
  provider: "anthropic"
  model: "claude-opus-4-6"
  max_tokens: 4096
  temperature: 0.1    # Temperature thap cho do chinh xac phap ly
  system_prompt: |
    Ban la tro ly phap ly AI chuyen ve luat phap Viet Nam.
    Hay tra loi cau hoi dua tren cac dieu luat duoc cung cap.
    Luon trich dan so hieu van ban, dieu khoan cu the.
    Neu khong chac chan, hay noi ro va khuyen nguoi dung tham khao luat su.

# --- Cau hinh Processing ---
processing:
  input_directory: "./data"
  output_directory: "./chunks"
  index_directory: "./index"
  supported_formats:
    - ".md"
  encoding: "utf-8"
  # Regex patterns cho cac cap do phap luat
  legal_patterns:
    phan: "^## Phan [IVXLC]+"
    chuong: "^## Chuong [IVXLC0-9]+"
    muc: "^### Muc [0-9]+"
    dieu: "^#### Dieu [0-9]+"
    khoan: "^[0-9]+\\."
    diem: "^[a-z]\\)"

# --- Logging ---
logging:
  level: "INFO"
  file: "./logs/vietclaw.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
